name: "[4.0] S3 Cross-Account Sync"

on:
  workflow_dispatch:
    inputs:
      source_bucket:
        description: "Source S3 bucket name"
        required: false
        type: string
        default: velero-backup-kubernetes-aws
      dest_bucket:
        description: "Destination S3 bucket name"
        required: false
        type: string
        default: velero-backup-kubernetes-aws-454879
      region:
        description: "AWS region"
        required: false
        type: choice
        options:
          - us-east-1
          - us-west-2
          - eu-west-1
        default: us-east-1
      dry_run:
        description: "Run in dry-run mode (preview changes only)"
        required: false
        type: boolean
        default: true

env:
  SOURCE_BUCKET: ${{ github.event.inputs.source_bucket }}
  DEST_BUCKET: ${{ github.event.inputs.dest_bucket }}
  AWS_REGION: ${{ github.event.inputs.region }}
  AWS_PAGER: ""

jobs:
  s3-sync:
    runs-on: ubuntu-latest

    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v2
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Verify AWS credentials
        run: |
          echo "Verifying AWS credentials by getting caller identity"
          aws sts get-caller-identity

      - name: Verify source bucket list access
        run: |
          echo "Verifying source bucket list access"
          aws s3 ls "s3://${{ env.SOURCE_BUCKET }}" --region "${{ env.AWS_REGION }}"

      - name: Verify target bucket write/delete test
        run: |
          TEST_FILE="/tmp/s3-target-test-$(date +%s).txt"
          TARGET_KEY=".workflow-tests/test.txt"
          echo "s3 target test" > "$TEST_FILE"

          echo "Uploading test file to target bucket"
          aws s3 cp "$TEST_FILE" "s3://${{ env.DEST_BUCKET }}/$TARGET_KEY" --region "${{ env.AWS_REGION }}"

          echo "Deleting test file from target bucket"
          aws s3 rm "s3://${{ env.DEST_BUCKET }}/$TARGET_KEY" --region "${{ env.AWS_REGION }}"

          rm -f "$TEST_FILE"

      - name: Sync source to destination
        run: |
          if [ "${{ github.event.inputs.dry_run }}" = "true" ]; then
            echo "Dry run: showing what would be synced"
            aws s3 sync "s3://${{ env.SOURCE_BUCKET }}" "s3://${{ env.DEST_BUCKET }}" --region "${{ env.AWS_REGION }}" --dryrun
          else
            echo "Running actual sync"
            aws s3 sync "s3://${{ env.SOURCE_BUCKET }}" "s3://${{ env.DEST_BUCKET }}" --region "${{ env.AWS_REGION }}"
          fi
