name: "[2.0] Velero - Backup & Restore"

on:
  workflow_dispatch:
    inputs:
      action:
        description: "Action"
        required: true
        default: "backup"
        type: choice
        options: [backup, restore, reconcile]
      type:
        description: "Storage Type"
        required: true
        default: "filesystem"
        type: choice
        options: [filesystem, snapshot]
      cluster_name:
        description: "Cluster Name"
        required: false
        type: choice
        options: [TESTPROJECT-DEV-GENERAL-00]
      restored_version:
        description: "Version to Restore"
        required: false
        type: choice
        options: [testproject-dev-general-00-2026.03.04-12.14.23]

      # --- NAMESPACE SELECTION ---
      inc_jenkins:
        description: "jenkins"
        type: boolean
        default: true
      inc_mongodb:
        description: "mongodb"
        type: boolean
        default: false
      inc_postgresql:
        description: "postgresql"
        type: boolean
        default: false
      inc_argocd:
        description: "argocd"
        type: boolean
        default: false
      inc_grafana_loki:
        description: "grafana-loki"
        type: boolean
        default: false

env:
  # Path Management
  BASE_PATH: "script/2.velero--backup-and-restore"
  BACKUP_SH: "script/2.velero--backup-and-restore/backup.sh"
  RESTORE_SH: "script/2.velero--backup-and-restore/restore.sh"
  RECONCILE_SH: "script/2.velero--backup-and-restore/reconcile.sh"

  # Credentials & Context
  GH_TOKEN: ${{ secrets.PAT_GITHUB }}
  AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
  AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
  REGION: "us-east-1"

jobs:
  velero-task:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v5
        with:
          persist-credentials: false

      - name: Initialize Workspace Permissions
        id: init
        run: |
          echo "Preparing executable permissions for scripts in $BASE_PATH..."
          if [ -d "$BASE_PATH" ]; then
            find "$BASE_PATH" -name "*.sh" -exec chmod +x {} +
            echo "Success: Scripts are now executable."
          else
            echo "Error: Directory $BASE_PATH not found."
            exit 1
          fi

      - name: Cloud Authentication
        if: github.event.inputs.action != 'reconcile'
        run: aws eks update-kubeconfig --name ${{ github.event.inputs.cluster_name }} --region $REGION

      - name: Install Velero CLI
        if: github.event.inputs.action != 'reconcile'
        run: |
          curl -sS https://raw.githubusercontent.com/khangtictoc/DevOps-Tools-Installation-Scripts/refs/heads/main/linux/installation/developer-packages/ubuntu/tools/velero_cli.sh | bash

      - name: "Logic: Build Namespace List"
        if: github.event.inputs.action == 'backup'
        run: |
          NS=""
          [[ "${{ github.event.inputs.inc_jenkins }}" == "true" ]] && NS+="jenkins,"
          [[ "${{ github.event.inputs.inc_mongodb }}" == "true" ]] && NS+="mongodb,"
          [[ "${{ github.event.inputs.inc_postgresql }}" == "true" ]] && NS+="postgresql,"
          [[ "${{ github.event.inputs.inc_argocd }}" == "true" ]] && NS+="argocd,"
          [[ "${{ github.event.inputs.inc_grafana_loki }}" == "true" ]] && NS+="grafana-loki,"

          NS_FINAL=$(echo $NS | sed 's/,$//')

          if [ -z "$NS_FINAL" ]; then
            echo "Error: You must select at least one namespace for backup."
            exit 1
          fi
          echo "SELECTED_NS=$NS_FINAL" >> $GITHUB_ENV

      - name: "Action: Run Backup"
        if: github.event.inputs.action == 'backup'
        run: |
          ./$BACKUP_SH "${{ github.event.inputs.cluster_name }}" "$SELECTED_NS" "${{ github.event.inputs.type }}"
          ./$RECONCILE_SH $GITHUB_REPOSITORY

      - name: "Action: Run Restore"
        if: github.event.inputs.action == 'restore'
        run: ./$RESTORE_SH "${{ github.event.inputs.restored_version }}" "${{ github.event.inputs.type }}"

      - name: "Action: Run Reconcile"
        if: github.event.inputs.action == 'reconcile'
        run: ./$RECONCILE_SH $GITHUB_REPOSITORY
