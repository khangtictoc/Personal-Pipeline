name: "[2.0] Velero - Backup & Restore"
run-name: >
  [Velero] ${{ github.event.inputs.action }}  on ${{ github.event.inputs.cluster_name }} (${{ github.event.inputs.cloud_provider }}/${{ github.event.inputs.region }})

on:
  workflow_dispatch:
    inputs:
      action:
        description: "Action"
        required: true
        default: "backup"
        type: choice
        options: [backup, restore, reconcile]
      cloud_provider:
        description: "Cloud Provider"
        required: true
        default: "aws"
        type: choice
        options: [aws, azure, gcp]
      region:
        description: "Region"
        required: true
        default: "us-east-1"
        type: choice
        options: [us-east-1, us-west-2, eu-west-1]
      resource_group:
        description: "Resource Group (Azure Only)"
        required: true
        default: "MY_RESOURCE_GROUP"
        type: choice
        options: [MY_RESOURCE_GROUP1, MY_RESOURCE_GROUP2, MY_RESOURCE_GROUP3]
      subscription_id:
        description: "Subscription ID (Azure Only)"
        required: true
        default: "00000000-0000-0000-0000-000000000000"
        type: choice
        options: [00000000-0000-0000-0000-000000000000, 11111111-1111-1111-1111-111111111111, 22222222-2222-2222-2222-222222222222]
      cluster_name:
        description: "Cluster Name"
        required: false
        type: choice
        options:
          - TESTPROJECT-DEV-GENERAL-00
        default: TESTPROJECT-DEV-GENERAL-00
      restored_version:
        description: "Version to Restore"
        required: false
        type: choice
        options:
          - testproject-dev-general-00-2026.04.14-13.27.07
          - testproject-dev-general-00-2026.04.14-06.03.47
          - testproject-dev-general-00-2026.04.14-05.36.09
          - testproject-dev-general-00-2026.04.14-05.32.09
          - jenkins-data-only6
          - jenkins-data-only5
          - jenkins-data-only4
          - jenkins-data-only3
          - jenkins-data-only2
          - jenkins-data-only
        default: testproject-dev-general-00-2026.04.14-13.27.07
      # --- NAMESPACE SELECTION (BOOLEANS) ---
      backup_jenkins:
        description: "jenkins"
        type: boolean
        default: true
      backup_mongodb:
        description: "mongodb"
        type: boolean
        default: false
      backup_mongodb_sharded:
        description: "mongodb-sharded"
        type: boolean
        default: false
      backup_postgresql:
        description: "postgresql"
        type: boolean
        default: false
      backup_argocd:
        description: "argocd"
        type: boolean
        default: false
      backup_argocd_apps:
        description: "argocd-apps"
        type: boolean
        default: false
      backup_vault:
        description: "hcp-vault"
        type: boolean
        default: false
      backup_grafana_loki:
        description: "grafana-loki"
        type: boolean
        default: false
      backup_grafana_mimir:
        description: "grafana-mimir"
        type: boolean
        default: false
      backup_grafana_tempo:
        description: "grafana-tempo"
        type: boolean
        default: false
      backup_cert_manager:
        description: "cert-manager"
        type: boolean
        default: false
      backup_nginx_ingress:
        description: "nginx-ingress"
        type: boolean
        default: false
      backup_testing:
        description: "testing"
        type: boolean
        default: false
env:
  # General config
  SECRET_MASK_LEN: 4
  BASE_PATH: "script/2.velero--backup-and-restore"
  BACKUP_SH: "script/2.velero--backup-and-restore/backup.sh"
  RESTORE_SH: "script/2.velero--backup-and-restore/restore.sh"
  RECONCILE_SH: "script/2.velero--backup-and-restore/reconcile.sh"
  # Credentials & Context
  GH_TOKEN: ${{ secrets.PAT_GITHUB }}
  AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
  AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
  REGION: ${{ github.event.inputs.region }}
jobs:
  verify-inputs:
    runs-on: ubuntu-latest
    steps:
      - name: "Audit: Secret Presence"
        run: |
          echo "GITHUB_PAT_TOKEN: ${GH_TOKEN:0:${SECRET_MASK_LEN}}****"
          echo "AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID:0:${SECRET_MASK_LEN}}****"
          echo "AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY:0:${SECRET_MASK_LEN}}****"
      - name: "Audit: Selection Summary"
        run: |
          echo "Action: ${{ github.event.inputs.action }}"
          echo "Cluster: ${{ github.event.inputs.cluster_name }}"
          echo "----------------------------------------"
          echo "Namespace Toggles:"
          echo " - Jenkins:    ${{ github.event.inputs.backup_jenkins }}"
          echo " - MongoDB:    ${{ github.event.inputs.backup_mongodb }}"
          echo " - PostgreSQL: ${{ github.event.inputs.backup_postgresql }}"
          echo " - ArgoCD:     ${{ github.event.inputs.backup_argocd }}"
          echo " - Vault:      ${{ github.event.inputs.backup_vault }}"
  velero-task:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v5
        with:
          persist-credentials: false
      - name: Initialize Workspace Permissions
        run: |
          echo "Preparing executable permissions for scripts in $BASE_PATH..."
          if [ -d "$BASE_PATH" ]; then
            find "$BASE_PATH" -name "*.sh" -exec chmod +x {} +
          else
            echo "Error: Directory $BASE_PATH not found."
            exit 1
          fi
      - name: Cloud Authentication
        run: aws eks update-kubeconfig --name ${{ github.event.inputs.cluster_name }} --region $REGION
      - name: Install Velero CLI
        run: |
          curl -sS https://raw.githubusercontent.com/khangtictoc/DevOps-Tools-Installation-Scripts/refs/heads/main/linux/installation/developer-packages/ubuntu/tools/velero_cli.sh | bash
      - name: "Logic: Build Namespace List"
        if: github.event.inputs.action == 'backup'
        run: |
          NS=""
          [[ "${{ github.event.inputs.backup_jenkins }}" == "true" ]] && NS+="jenkins,"
          [[ "${{ github.event.inputs.backup_mongodb }}" == "true" ]] && NS+="mongodb,"
          [[ "${{ github.event.inputs.backup_mongodb_sharded }}" == "true" ]] && NS+="mongodb-sharded,"
          [[ "${{ github.event.inputs.backup_postgresql }}" == "true" ]] && NS+="postgresql,"
          [[ "${{ github.event.inputs.backup_argocd }}" == "true" ]] && NS+="argocd,"
          [[ "${{ github.event.inputs.backup_argocd_apps }}" == "true" ]] && NS+="argocd-apps,"
          [[ "${{ github.event.inputs.backup_vault }}" == "true" ]] && NS+="hcp-vault,"
          [[ "${{ github.event.inputs.backup_grafana_loki }}" == "true" ]] && NS+="grafana-loki,"
          [[ "${{ github.event.inputs.backup_grafana_mimir }}" == "true" ]] && NS+="grafana-mimir,"
          [[ "${{ github.event.inputs.backup_grafana_tempo }}" == "true" ]] && NS+="grafana-tempo,"
          [[ "${{ github.event.inputs.backup_cert_manager }}" == "true" ]] && NS+="cert-manager,"
          [[ "${{ github.event.inputs.backup_nginx_ingress }}" == "true" ]] && NS+="nginx-ingress,"
          [[ "${{ github.event.inputs.backup_testing }}" == "true" ]] && NS+="testing,"

          NS_FINAL=$(echo $NS | sed 's/,$//')

          if [ -z "$NS_FINAL" ]; then
            echo "Error: No namespaces selected for backup."
            exit 1
          fi
          echo "SELECTED_NS=$NS_FINAL" >> $GITHUB_ENV
      - name: "Action: Run Backup"
        if: github.event.inputs.action == 'backup'
        run: |
          ./$BACKUP_SH "${{ github.event.inputs.cluster_name }}" "$SELECTED_NS"
          ./$RECONCILE_SH $GITHUB_REPOSITORY
      - name: "Action: Run Restore"
        if: github.event.inputs.action == 'restore'
        run: ./$RESTORE_SH "${{ github.event.inputs.restored_version }}"
      - name: "Action: Run Reconcile"
        if: github.event.inputs.action == 'reconcile'
        run: ./$RECONCILE_SH $GITHUB_REPOSITORY
